# Local Postgres + Mailpit for development.
# - Postgres: DATABASE_URL → localhost:5432
# - Mailpit SMTP: SMTP_HOST=localhost, SMTP_PORT=1025 → UI http://localhost:8025
services:
  db:
    image: postgres:16.4
    environment:
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/db:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
